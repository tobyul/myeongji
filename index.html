<!DOCTYPE html>
<html lang="ko" data-theme="spring">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>명지국제자유방 이웃점빵</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 카카오맵 API -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=67015c72ec5b9ba4909f201cc8aa8601&libraries=services"></script>

    <link rel="stylesheet" href="common-style.css?ver=1.4.2">

    <!-- 카테고리 설정 로드 -->
    <script src="categories.js"></script>
    <script src="theme-loader.js" defer></script>

    <style>
        .card-theme {
            background-color: var(--bs-body-bg) !important;
            color: var(--bs-body-color) !important;
        }
        .card-theme .card-body {
            background-color: var(--bs-body-bg) !important;
        }
        .card-theme .card-footer {
            background-color: var(--bs-body-bg) !important;
            border-top: 1px solid var(--bs-border-color) !important;
        }
        .card-theme .alert-warning {
            background-color: var(--bs-warning-bg-subtle) !important;
            border-color: var(--bs-warning-border-subtle) !important;
            color: var(--bs-warning-text) !important;
        }
        /* 에디터로 저장된 HTML 콘텐츠 스타일 보정 */
        .rich-content img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 4px 0;
        }
        .rich-content p { margin-bottom: 0.4rem; }
        .rich-content ul, .rich-content ol { padding-left: 1.2rem; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration: none;">
        <div class="logo-container">
            <img src="images/logo.png" alt="명지국제자유방 이웃점빵 로고">
        </div>
    </a>
    <div class="container-fluid py-4">
        <div class="row mb-3">
            <div class="col-12">
                <div class="input-group">
                    <input type="text" id="searchInput" class="form-control" placeholder="점빵명 또는 키워드로 검색...">
                    <button id="searchButton" class="btn btn-secondary">검색</button>
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-12">
                <div class="btn-group w-100" role="group" id="categoryButtons">
                    <!-- JavaScript로 동적 생성됨 -->
                </div>
            </div>
        </div>

        <div id="storeContainer" class="row g-3">
            <!-- 동적으로 카드 추가될 영역 -->
        </div>

        <!-- 페이지네이션 -->
        <div class="d-flex justify-content-center mt-4">
            <nav aria-label="Page navigation">
                <ul class="pagination" id="pagination"></ul>
            </nav>
        </div>

        <!-- 이벤트 업체 섹션 -->
        <div class="row mb-4 mt-4">
            <div class="col-12">
                <h5 class="text-secondary mb-3">⭐ 행사점빵</h5>
                <div class="row g-3" id="eventsStoresContainer"></div>
            </div>
        </div>

        <!-- 최근 등록된 업체 섹션 -->
        <div class="row mb-4 mt-4">
            <div class="col-12">
                <h5 class="text-secondary mb-3">🆕 신규점빵</h5>
                <div class="row g-3" id="recentStoresContainer"></div>
            </div>
        </div>

        <!-- 방문자 수 통계 -->
        <div class="visitor-stats text-center mt-4 mb-4">
            <div class="card">
                <div class="card-body">
                    <h6 class="text-muted mb-3">고마우신 분들</h6>
                    <div class="d-flex justify-content-center gap-4">
                        <div>
                            <span class="text-secondary">오늘 방문하신 분</span>
                            <h5 class="mb-0" id="uniqueVisits">0</h5>
                        </div>
                        <div>
                            <span class="text-secondary">총 방문횟수</span>
                            <h5 class="mb-0" id="totalVisits">0</h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white py-3 mt-4">
        <div class="container text-center">
            <small class="text-muted">© 2025 삼정더베스트/록커. All Rights Reserved.</small>
            <div class="mt-2">
                <a href="login.html" class="footer-link" id="authLink">관리자</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js"></script>

    <script>
        let currentCategory = CATEGORIES.ALL;
        const itemsPerPage = 12;
        let currentPage = 1;
        let totalStores = [];

        // ── 지도 초기화 ──────────────────────────────────────────────────────────
        function initializeMap(mapId, address) {
            const mapContainer = document.getElementById(mapId);
            if (!mapContainer || mapContainer.querySelector('.map_canvas')) return;

            mapContainer.innerHTML = '<div class="text-center py-3"><div class="spinner-border text-secondary" role="status"><span class="visually-hidden">Loading...</span></div></div>';

            setTimeout(() => {
                try {
                    const map = new kakao.maps.Map(mapContainer, {
                        center: new kakao.maps.LatLng(33.450701, 126.570667),
                        level: 3
                    });
                    const geocoder = new kakao.maps.services.Geocoder();
                    geocoder.addressSearch(address, function(result, status) {
                        if (status === kakao.maps.services.Status.OK) {
                            const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                            new kakao.maps.Marker({ map, position: coords });
                            map.setCenter(coords);
                        } else {
                            mapContainer.innerHTML = '<div class="alert alert-warning">주소를 찾을 수 없습니다.</div>';
                        }
                    });
                } catch (error) {
                    mapContainer.innerHTML = '<div class="alert alert-danger">지도를 불러올 수 없습니다.</div>';
                }
            }, 300);
        }

        // ── HTML 안전 처리 (description 외 일반 텍스트용) ─────────────────────
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // ── 메인 스토어 카드 생성 ────────────────────────────────────────────────
        // description은 에디터 HTML이므로 innerHTML로 렌더링
        // benefit 등 일반 필드는 white-space:pre-wrap 텍스트로 유지
        function createStoreCard(store) {
            const card = document.createElement('div');
            card.className = 'col-12 col-md-6 col-lg-4';
            const mapId = `map-${store._id}`;

            card.innerHTML = `
                <div class="card h-100">
                    <div class="card-header ${getCategoryColor(store.category)}" data-bs-toggle="collapse" 
                         data-bs-target="#store-${store._id}">
                        <div>
                            <h5 class="card-title">${escapeHtml(store.name)}</h5>
                            <small>${escapeHtml(store.nickname)}</small>
                        </div>
                        <i class="bi bi-chevron-down text-muted"></i>
                    </div>
                    <div id="store-${store._id}" class="collapse">
                        <div class="card-body">
                            ${store.description
                                ? `<div class="card-text mb-2"><strong>ℹ️</strong> <div class="rich-content ms-1">${store.description}</div></div>`
                                : ''}
                            ${store.benefit
                                ? `<p class="card-text"><strong>🎁</strong> <span class="benefit" style="white-space: pre-wrap;">${escapeHtml(store.benefit)}</span></p>`
                                : ''}
                            ${store.code
                                ? `<p class="card-text"><strong>🔑</strong> <span class="text-success">${escapeHtml(store.code)}</span></p>`
                                : ''}
                            ${store.contact
                                ? `<p class="card-text"><strong>📞</strong> ${escapeHtml(store.contact)}</p>`
                                : ''}
                            ${store.site_url
                                ? `<p class="card-text"><strong>🌐</strong> <a href="${escapeHtml(store.site_url)}" target="_blank">${escapeHtml(store.site_url)}</a></p>`
                                : ''}
                            ${store.address
                                ? `<p class="card-text"><strong>🚗</strong> ${escapeHtml(store.address)}</p>
                                   <div id="${mapId}" style="width:100%;height:200px;margin-top:10px;"></div>`
                                : ''}
                        </div>
                    </div>
                </div>
            `;

            if (store.address) {
                card.querySelector(`[data-bs-target="#store-${store._id}"]`)
                    .addEventListener('click', () => setTimeout(() => initializeMap(mapId, store.address), 100));
            }

            return card;
        }

        // ── 이벤트 카드 생성 ─────────────────────────────────────────────────────
        // event_content도 에디터 HTML이므로 innerHTML 렌더링
        function createEventStoreCard(store) {
            const card = document.createElement('div');
            card.className = 'col-12 col-md-4';
            card.innerHTML = `
                <div class="card h-100 border-0 shadow-sm card-theme">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-2">
                            <span class="badge bg-warning me-2">EVENT</span>
                            <h5 class="card-title mb-0">${escapeHtml(store.name)}</h5>
                        </div>
                        <h6 class="text-muted">${escapeHtml(store.nickname)}</h6>
                        ${store.event_content
                            ? `<div class="alert alert-warning p-2 my-2">
                                   <strong>🎉 이벤트 </strong>
                                   <div class="event-content-box rich-content">${store.event_content}</div>
                                   <div class="small mt-1 text-muted">
                                       ${new Date(store.start_date).toLocaleDateString()} ~ ${new Date(store.end_date).toLocaleDateString()}
                                   </div>
                               </div>`
                            : ''}
                        ${store.benefit
                            ? `<p class="card-text small"><span class="text-danger">혜택: ${escapeHtml(store.benefit)}</span></p>`
                            : ''}
                        <div class="text-end mt-2">
                            <button class="btn btn-sm btn-outline-secondary view-details" data-store-id="${store._id}">자세히 보기</button>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-top">
                        <i class="bi bi-tag"></i> ${escapeHtml(store.category)}
                    </div>
                </div>
            `;
            return card;
        }

        // ── 최근 등록 카드 생성 ──────────────────────────────────────────────────
        function createRecentStoreCard(store) {
            const card = document.createElement('div');
            card.className = 'col-12 col-md-4';
            const badgeClass = getCategoryBadgeColor(store.category);
            card.innerHTML = `
                <div class="card h-100 border-0 shadow-sm card-theme">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-2">
                            <span class="badge ${badgeClass} me-2">NEW</span>
                            <h5 class="card-title mb-0">${escapeHtml(store.name)}</h5>
                        </div>
                        <h6 class="text-muted">${escapeHtml(store.nickname)}</h6>
                        ${store.description
                            ? `<div class="rich-content small mb-1">${store.description}</div>`
                            : ''}
                        ${store.benefit
                            ? `<p class="card-text small" style="white-space: pre-wrap;"><span class="text-danger">혜택: ${escapeHtml(store.benefit)}</span></p>`
                            : ''}
                        <div class="text-end mt-2">
                            <button class="btn btn-sm btn-outline-secondary view-details" data-store-id="${store._id}">자세히 보기</button>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent text-muted small">
                        <i class="bi bi-tag"></i> ${escapeHtml(store.category)}
                    </div>
                </div>
            `;
            return card;
        }

        // ── 자세히 보기 버튼 이벤트 등록 ────────────────────────────────────────
        function setupRecentStoreButtons() {
            document.querySelectorAll('.view-details').forEach(button => {
                button.addEventListener('click', function() {
                    const storeId = this.getAttribute('data-store-id');
                    const targetHeader = document.querySelector(`[data-bs-target="#store-${storeId}"]`);

                    if (targetHeader) {
                        targetHeader.scrollIntoView({ behavior: 'smooth' });
                        setTimeout(() => targetHeader.click(), 500);
                    } else {
                        const foundIndex = totalStores.findIndex(s => s._id == storeId);
                        if (foundIndex >= 0) {
                            renderPage(Math.floor(foundIndex / itemsPerPage) + 1);
                            renderPagination();
                            setTimeout(() => {
                                const card = document.querySelector(`[data-bs-target="#store-${storeId}"]`);
                                if (card) {
                                    card.scrollIntoView({ behavior: 'smooth' });
                                    setTimeout(() => card.click(), 500);
                                }
                            }, 300);
                        }
                    }
                });
            });
        }

        // ── 데이터 패치 ──────────────────────────────────────────────────────────
        async function fetchEventStores() {
            try {
                const res = await fetch('https://reib.duckdns.org:3001/api/stores/events');
                const eventStores = await res.json();
                const container = document.getElementById('eventsStoresContainer');
                container.innerHTML = '';

                if (eventStores.length === 0) {
                    container.closest('.row.mb-4.mt-4').style.display = 'none';
                    return;
                }
                eventStores.forEach(store => container.appendChild(createEventStoreCard(store)));
                setupRecentStoreButtons();
            } catch (error) {
                console.error('행사 업체 조회 실패:', error);
                document.getElementById('eventsStoresContainer').closest('.row.mb-4.mt-4').style.display = 'none';
            }
        }

        async function fetchRecentStores() {
            try {
                const res = await fetch('https://reib.duckdns.org:3001/api/stores/recent?limit=3');
                const recentStores = await res.json();
                const container = document.getElementById('recentStoresContainer');
                container.innerHTML = '';

                if (recentStores.length === 0) {
                    document.querySelector('.row.mb-4.mt-4').style.display = 'none';
                    return;
                }
                recentStores.forEach(store => container.appendChild(createRecentStoreCard(store)));
                setupRecentStoreButtons();
            } catch (error) {
                console.error('최근 업체 조회 실패:', error);
                document.querySelector('.row.mb-4.mt-4').style.display = 'none';
            }
        }

        function fetchStores(category = CATEGORIES.ALL, searchTerm = '') {
            let url = 'https://reib.duckdns.org:3001/api/stores';
            if (category !== CATEGORIES.ALL && !searchTerm) {
                url = `https://reib.duckdns.org:3001/api/stores/category?name=${encodeURIComponent(category)}`;
            } else if (searchTerm) {
                url = `https://reib.duckdns.org:3001/api/stores/search?term=${encodeURIComponent(searchTerm)}`;
            }
            fetch(url)
                .then(r => r.json())
                .then(stores => {
                    totalStores = stores;
                    renderPage(1);
                    renderPagination();
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('데이터를 불러오는 중 오류가 발생했습니다.');
                });
        }

        // ── 페이지 렌더링 ────────────────────────────────────────────────────────
        function renderPage(pageNumber) {
            currentPage = pageNumber;
            const pageStores = totalStores.slice((pageNumber - 1) * itemsPerPage, pageNumber * itemsPerPage);
            const container  = document.getElementById('storeContainer');
            container.innerHTML = '';
            pageStores.forEach(store => container.appendChild(createStoreCard(store)));
        }

        function renderPagination() {
            const totalPages = Math.ceil(totalStores.length / itemsPerPage);
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            if (totalPages <= 1) return;

            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
            prevLi.innerHTML = `<a class="page-link text-secondary" href="#" aria-label="Previous"><span aria-hidden="true">&laquo;</span></a>`;
            prevLi.addEventListener('click', e => {
                e.preventDefault();
                if (currentPage > 1) { renderPage(currentPage - 1); renderPagination(); }
            });
            pagination.appendChild(prevLi);

            for (let i = 1; i <= totalPages; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${currentPage === i ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
                li.addEventListener('click', e => {
                    e.preventDefault();
                    renderPage(i);
                    renderPagination();
                });
                pagination.appendChild(li);
            }

            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
            nextLi.innerHTML = `<a class="page-link text-secondary" href="#" aria-label="Next"><span aria-hidden="true">&raquo;</span></a>`;
            nextLi.addEventListener('click', e => {
                e.preventDefault();
                if (currentPage < totalPages) { renderPage(currentPage + 1); renderPagination(); }
            });
            pagination.appendChild(nextLi);
        }

        // ── 방문자 ────────────────────────────────────────────────────────────────
        function generateSessionId() {
            return 'sess_' + Math.random().toString(36).substr(2, 9);
        }

        async function logVisit() {
            let sessionId = sessionStorage.getItem('visitorSessionId');
            let lastActivityTime = sessionStorage.getItem('lastActivityTime');
            const currentTime = Date.now();
            const TIMEOUT = 30 * 60 * 1000;

            if (!sessionId || !lastActivityTime || (currentTime - Number(lastActivityTime)) > TIMEOUT) {
                sessionId = generateSessionId();
                sessionStorage.setItem('visitorSessionId', sessionId);
                sessionStorage.setItem('lastActivityTime', currentTime.toString());

                try {
                    const res = await fetch('https://reib.duckdns.org:3001/api/visitor/log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sessionId, pageUrl: window.location.href, userAgent: navigator.userAgent })
                    });
                    if (!res.ok) throw new Error('방문 기록 실패');
                    await displayVisitorCount();
                } catch (error) {
                    console.error('방문 기록 실패:', error);
                }
            } else {
                sessionStorage.setItem('lastActivityTime', currentTime.toString());
            }
        }

        async function displayVisitorCount() {
            try {
                const res = await fetch('https://reib.duckdns.org:3001/api/visitor/stats');
                const stats = await res.json();
                document.getElementById('totalVisits').textContent  = stats.total_visits;
                document.getElementById('uniqueVisits').textContent = stats.unique_visits;
            } catch (error) {
                console.error('통계 조회 실패:', error);
            }
        }

        // ── 카테고리 버튼 ────────────────────────────────────────────────────────
        function initCategoryButtons() {
            const container = document.getElementById('categoryButtons');

            const allBtn = document.createElement('button');
            allBtn.type = 'button';
            allBtn.className = 'btn btn-outline-secondary category-btn active';
            allBtn.dataset.category = CATEGORIES.ALL;
            allBtn.textContent = CATEGORIES.ALL;
            container.appendChild(allBtn);

            CATEGORY_LIST.forEach(category => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn btn-outline-secondary category-btn';
                btn.dataset.category = category;
                btn.textContent = category;
                container.appendChild(btn);
            });

            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    fetchStores(currentCategory);
                });
            });
        }

        // ── 검색 ─────────────────────────────────────────────────────────────────
        document.getElementById('searchButton').addEventListener('click', () => {
            fetchStores(currentCategory, document.getElementById('searchInput').value);
        });
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') fetchStores(currentCategory, document.getElementById('searchInput').value);
        });

        // ── DOMContentLoaded ──────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            initCategoryButtons();
            fetchStores();
            fetchEventStores();
            fetchRecentStores();
            logVisit();
            displayVisitorCount();
        });
    </script>
</body>
</html>
