<!DOCTYPE html>
<html lang="ko" data-theme="spring">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>명지국제자유방 이웃점빵 - 이벤트 등록/수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Toast UI Editor CSS -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <link rel="stylesheet" href="common-style.css?ver=1.0">
    <style>
        .logo-container { text-align: center; padding: 20px 0; }
        .logo-container img { max-width: 200px; max-height: 180px; }
        .page-title { color: var(--theme-accent-dark); font-weight: 600; margin-bottom: 30px; }
        #userInfoBar { padding: 10px 20px; }
        #loggedInUser { font-weight: 500; color: var(--theme-accent-dark); }
        .alert { margin-top: 20px; }
        .form-buttons { margin-top: 30px; }

        /* Toast UI Editor 래퍼 */
        #eventContentEditor {
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            overflow: hidden;
        }
        /* WYSIWYG 모드 고정 - 탭 숨김 */
        .toastui-editor-tabs {
            display: none !important;
        }

        [data-theme="dark"] #eventContentEditor {
            border-color: #303456;
        }
        [data-theme="dark"] .toastui-editor-defaultUI {
            background-color: #242842;
            color: var(--theme-text-primary);
        }
        [data-theme="dark"] .toastui-editor-toolbar {
            background-color: #303456;
            border-color: #404560;
        }
    </style>
    <script src="theme-loader.js"></script>
</head>
<body>
    <a href="index.html" style="text-decoration: none;">
        <div class="logo-container">
            <img src="images/logo.png" alt="명지국제자유방 이웃점빵 로고">
        </div>
    </a>

    <div id="userInfoBar" class="d-flex justify-content-end align-items-center">
        <span id="loggedInUser" class="me-3"></span>
        <button id="logoutButton" class="btn btn-sm btn-outline-secondary">로그아웃</button>
    </div>

    <div class="container py-4">
        <h2 class="page-title" id="pageTitle">이벤트 등록</h2>

        <form id="eventForm" class="needs-validation" novalidate>
            <input type="hidden" id="eventId" name="event_id">

            <div class="mb-3">
                <label for="storeSelect" class="form-label">점빵 선택 <span class="text-danger">*</span></label>
                <select class="form-select" id="storeSelect" name="store_id" required>
                    <option value="">점빵을 선택해주세요</option>
                </select>
                <div class="invalid-feedback">점빵을 선택해주세요.</div>
            </div>

            <!-- event_content: Toast UI Editor 적용 -->
            <div class="mb-3">
                <label class="form-label">이벤트 내용 <span class="text-danger">*</span></label>
                <div id="eventContentEditor"></div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="startDate" class="form-label">시작일 <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="startDate" name="start_date" required>
                    <div class="invalid-feedback">시작일을 선택해주세요.</div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="endDate" class="form-label">종료일 <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="endDate" name="end_date" required>
                    <div class="invalid-feedback">종료일을 선택해주세요.</div>
                </div>
            </div>

            <div class="form-buttons d-flex justify-content-between">
                <button type="button" id="cancelButton" class="btn btn-secondary">취소</button>
                <button type="submit" id="saveButton" class="btn btn-primary">저장</button>
            </div>
        </form>

        <div class="alert alert-success d-none" id="successAlert"></div>
        <div class="alert alert-danger d-none" id="errorAlert"></div>
    </div>

    <footer class="bg-white py-3">
        <div class="container text-center">
            <small class="text-muted">© 2025 삼정더베스트/록커. All Rights Reserved.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Toast UI Editor JS -->
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>

    <script>
        const API_BASE_URL = 'https://reib.duckdns.org:3001';
        let eventContentEditor = null;

        // ── Toast UI Editor 초기화 (WYSIWYG 전용) ────────────────────────────────
        function initEditor(initialHtml = '') {
            eventContentEditor = new toastui.Editor({
                el: document.getElementById('eventContentEditor'),
                height: '300px',
                initialEditType: 'wysiwyg',
                previewStyle: 'vertical',
                initialValue: initialHtml,
                hooks: {
                    addImageBlobHook: async (blob, callback) => {
                        const formData = new FormData();
                        formData.append('image', blob);
                        try {
                            const token = localStorage.getItem('auth_token');
                            const res = await fetch(`${API_BASE_URL}/api/upload/image`, {
                                method: 'POST',
                                headers: { 'Authorization': `Bearer ${token}` },
                                body: formData
                            });
                            if (!res.ok) throw new Error('업로드 실패');
                            const data = await res.json();
                            callback(data.url, '업로드된 이미지');
                        } catch (err) {
                            console.error('이미지 업로드 오류:', err);
                            alert('이미지 업로드에 실패했습니다.');
                        }
                    }
                }
            });
        }

        // ── 페이지 로드 ──────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            if (!checkAuth()) return;

            const { token, username } = getAuth();
            document.getElementById('loggedInUser').textContent = `${username}님`;

            await initForm();
        });

        // ── 인증 ─────────────────────────────────────────────────────────────────
        function getAuth() {
            return {
                token:    localStorage.getItem('auth_token'),
                username: localStorage.getItem('username')
            };
        }

        function checkAuth() {
            const { token, username } = getAuth();
            if (!token || !username) {
                localStorage.clear();
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        function redirectToLogin() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('username');
            window.location.href = 'login.html';
        }

        // ── 폼 초기화 ────────────────────────────────────────────────────────────
        async function initForm() {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode') || 'add';
            const id   = params.get('id') || null;

            await loadStoreList();

            if (mode === 'edit' && id) {
                document.getElementById('pageTitle').textContent = '이벤트 수정';
                await fetchEventById(id);
            } else {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('startDate').value = today;
                document.getElementById('endDate').value   = today;
                initEditor('');
            }
        }

        // ── 점빵 목록 로드 ───────────────────────────────────────────────────────
        async function loadStoreList() {
            try {
                const { token } = getAuth();
                const res = await fetch(`${API_BASE_URL}/api/stores`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error(`점빵 목록 로드 실패 (${res.status})`);

                const data  = await res.json();
                const stores = Array.isArray(data) ? data : (data.stores || []);
                const select = document.getElementById('storeSelect');

                stores.forEach(store => {
                    const opt = document.createElement('option');
                    opt.value       = store._id;
                    opt.textContent = store.name;
                    select.appendChild(opt);
                });
            } catch (error) {
                console.error(error);
                showError(`점빵 목록을 불러오지 못했습니다: ${error.message}`);
            }
        }

        // ── 이벤트 데이터 로드 (수정 모드) ──────────────────────────────────────
        async function fetchEventById(id) {
            try {
                const { token } = getAuth();
                const res = await fetch(`${API_BASE_URL}/api/events/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error(`이벤트 로드 실패 (${res.status})`);

                const eventData = await res.json();
                bindEventData(eventData);
            } catch (error) {
                console.error(error);
                showError(`이벤트 정보를 불러오지 못했습니다: ${error.message}`);
                initEditor('');
            }
        }

        // ── 데이터 바인딩 ────────────────────────────────────────────────────────
        function bindEventData(eventData) {
            document.getElementById('eventId').value         = eventData.event_id;
            document.getElementById('storeSelect').value     = eventData.store_id;

            if (eventData.start_date) {
                document.getElementById('startDate').value = new Date(eventData.start_date).toISOString().split('T')[0];
            }
            if (eventData.end_date) {
                document.getElementById('endDate').value = new Date(eventData.end_date).toISOString().split('T')[0];
            }

            // event_content를 에디터에 HTML로 세팅
            initEditor(eventData.event_content || '');
        }

        // ── 폼 제출 ──────────────────────────────────────────────────────────────
        document.getElementById('eventForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!validateForm()) return;

            const params  = new URLSearchParams(window.location.search);
            const isEdit  = params.get('mode') === 'edit';
            const eventId = document.getElementById('eventId').value;

            const eventData = {
                event_id:      eventId,
                store_id:      document.getElementById('storeSelect').value,
                event_content: eventContentEditor ? eventContentEditor.getHTML() : '',
                start_date:    document.getElementById('startDate').value,
                end_date:      document.getElementById('endDate').value
            };

            await saveEvent(eventData, isEdit);
        });

        // ── 이벤트 저장 ──────────────────────────────────────────────────────────
        async function saveEvent(eventData, isEdit) {
            try {
                const { token } = getAuth();
                const url    = isEdit ? `${API_BASE_URL}/api/events/${eventData.event_id}` : `${API_BASE_URL}/api/events`;
                const method = isEdit ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(eventData)
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.message || `저장 실패 (${res.status})`);
                }

                showSuccess(isEdit ? '이벤트가 수정되었습니다.' : '이벤트가 등록되었습니다.');
                setTimeout(() => { window.location.href = 'store-list.html'; }, 2000);
            } catch (error) {
                console.error(error);
                showError(`이벤트 저장에 실패했습니다: ${error.message}`);
            }
        }

        // ── 유효성 검사 ──────────────────────────────────────────────────────────
        function validateForm() {
            const form = document.getElementById('eventForm');
            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return false;
            }

            // 에디터 내용 필수 확인
            const content = eventContentEditor ? eventContentEditor.getHTML() : '';
            if (!content || content === '<p><br></p>') {
                showError('이벤트 내용을 입력해주세요.');
                return false;
            }

            const startDate = new Date(document.getElementById('startDate').value);
            const endDate   = new Date(document.getElementById('endDate').value);
            if (endDate < startDate) {
                showError('종료일은 시작일보다 빠를 수 없습니다.');
                return false;
            }

            return true;
        }

        // ── 이벤트 리스너 ────────────────────────────────────────────────────────
        document.getElementById('cancelButton').addEventListener('click', () => {
            window.location.href = 'store-list.html';
        });

        document.getElementById('logoutButton').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        function showSuccess(message) {
            const el = document.getElementById('successAlert');
            el.textContent = message;
            el.classList.remove('d-none');
            document.getElementById('errorAlert').classList.add('d-none');
            // 폼 비활성화
            document.getElementById('eventForm').querySelectorAll('input, textarea, select, button')
                .forEach(el => el.disabled = true);
        }

        function showError(message) {
            const el = document.getElementById('errorAlert');
            el.textContent = message;
            el.classList.remove('d-none');
            document.getElementById('successAlert').classList.add('d-none');
        }
    </script>
</body>
</html>
